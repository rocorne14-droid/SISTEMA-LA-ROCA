<!DOCTYPE html>
<html lang="es">
<head>
<form action="/set_margen" method="post" class="mb-3">
    <label>Margen:</label>
    <select name="margen" class="form-select" onchange="this.form.submit()">
        <option value="0.10">10%</option>
        <option value="0.20">20%</option>
        <option value="0.30" selected>30%</option>
        <option value="0.40">40%</option>
    </select>
</form>
    <meta charset="UTF-8">
    <title>Cotización</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
        .card {
            background: #1e293b;
            border-radius: 15px;
        }
        .table {
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">
        <h3>🧾 Cotización</h3>

      <table class="table table-striped mt-3">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Proveedor</th>
            <th>Costo</th>
            <th>Venta</th>
            <th>Ganancia</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody>
        {% for p in datos %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>${{ p[2] }}</td>
            <td>${{ p[3] }}</td>
            <td>${{ p[4] }}</td>
            <td>
                <a href="/eliminar/{{ p[0] }}" class="btn btn-danger btn-sm">❌</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

        <h4 class="mt-3">TOTAL: ${{ total }}</h4>

        <a href="/pdf" class="btn btn-success mt-3">📄 Descargar PDF</a>
        <a href="/" class="btn btn-secondary mt-3">⬅ Volver</a>
    </div>

</div>

</body>
</html>
