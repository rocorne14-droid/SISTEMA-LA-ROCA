<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Ferretería</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
        .card {
            border-radius: 15px;
            background: #1e293b;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
        }
        .table {
            color: white;
        }
        .navbar {
            background: #020617;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
    <div class="container-fluid">
        <h4>🔧 Ferretería Pro System</h4>
    </div>
</nav>

<div class="container mt-4">

    <!-- BUSCADOR -->
    <div class="card p-4 mb-4">
        <h5>🔎 Buscar producto</h5>

        <form action="/buscar" method="post">
            <input type="text" name="producto" class="form-control mb-2" placeholder="Ej: Tornillo 6x1">
            <button class="btn btn-primary w-100">Buscar</button>
        </form>
    </div>

    <!-- OCR -->
    <div class="card p-4 mb-4">
        <h5>📸 Subir imagen (OCR)</h5>

        <form action="/ocr" method="post" enctype="multipart/form-data">
            <input type="file" name="imagen" class="form-control mb-2">
            <button class="btn btn-success w-100">Procesar Imagen</button>
        </form>
    </div>

    <!-- PDF -->
    <div class="card p-4 mb-4">
        <h5>📄 Subir catálogo PDF</h5>

        <form action="/cargar_pdf" method="post" enctype="multipart/form-data">
            <input type="file" name="pdf" class="form-control mb-2">
            <button class="btn btn-warning w-100">Cargar PDF</button>
        </form>
    </div>

    <!-- IR A COTIZACION -->
    <div class="text-center">
        <a href="/cotizacion" class="btn btn-light">🧾 Ver Cotización</a>
    </div>

</div>

</body>
</html>
